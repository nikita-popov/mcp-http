# Reverse proxy for mcp-http.
# Each mcp-http instance runs on its own port (127.0.0.1 only).
# Expose via HTTPS path prefixes.

server {
    listen 443 ssl;
    server_name your-domain.example.com;

    # ssl_certificate / ssl_certificate_key — configure as usual.

    # dav-mcp instance (mcp-http@dav-mcp.service, port 8771)
    location /dav/ {
        proxy_pass         http://127.0.0.1:8771/;
        proxy_set_header   Host $host;
        proxy_read_timeout 60s;
    }

    # mempalace instance (mcp-http@mempalace.service, port 8772)
    location /mem/ {
        proxy_pass         http://127.0.0.1:8772/;
        proxy_set_header   Host $host;
        proxy_read_timeout 60s;
    }
}
