# Drop-in location block for an existing HTTPS server{} context.
# Include inside your SSL server block:
#   include /etc/nginx/snippets/mcp-http-<name>.conf;
#
# For the systemd template pattern (mcp-http@<name>.service),
# each instance binds its own port defined in /etc/mcp-http/<name>.env.
#
# Example: two instances
#   mcp-http@mempalace  → 127.0.0.1:8772  → /mem/
#   mcp-http@dav-mcp    → 127.0.0.1:8771  → /dav/

location /mcp/ {
    proxy_pass          http://127.0.0.1:8765/;
    proxy_http_version  1.1;

    proxy_set_header    Host              $host;
    proxy_set_header    X-Real-IP         $remote_addr;
    proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto $scheme;
    proxy_set_header    Connection        "";

    # Required for Streamable HTTP / SSE — never buffer MCP responses.
    proxy_buffering     off;
    proxy_cache         off;

    # Keep connections open during tool execution.
    proxy_read_timeout  300s;
    proxy_send_timeout  300s;

    client_max_body_size 16m;
}
